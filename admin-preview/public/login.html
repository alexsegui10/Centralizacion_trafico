<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            background-color: #0e0e13;
            color: #f8f5fd;
            font-family: 'Inter', sans-serif;
        }
        .neon-glow:focus-within {
            box-shadow: 0 0 15px rgba(0, 227, 253, 0.15);
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            background-color: rgba(31, 31, 38, 0.8);
        }

<body class="bg-surface font-body antialiased flex items-center justify-center min-h-screen selection:bg-primary selection:text-on-primary-fixed overflow-hidden">
<!-- Suppressed Nav Shell: Login is a focused journey -->
<!-- Background Atmosphere -->
<div class="fixed inset-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[420px] px-6">
<!-- Identity Anchor -->
<div class="flex flex-col items-center mb-10">
<div class="w-12 h-12 bg-gradient-to-br from-primary to-primary-dim rounded-lg flex items-center justify-center mb-6 shadow-[0px_0px_20px_rgba(182,160,255,0.3)]">
<span class="material-symbols-outlined text-on-primary-fixed text-2xl" data-icon="lock">lock</span>
</div>
<h1 class="text-on-surface text-xl font-bold tracking-tighter uppercase mb-1">Admin Panel</h1>
<p class="text-on-surface-variant text-xs font-medium tracking-widest uppercase opacity-60">System Access Protocol</p>
</div>
<!-- Login Card -->
<div class="glass-panel border border-outline-variant/10 rounded-xl p-8 shadow-[0px_24px_48px_rgba(0,0,0,0.5)]">
<form class="space-y-6">
<!-- User ID Field -->
<div class="space-y-2">
<label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.2em] ml-1" for="user-id">
                        Administrator Identifier
                    </label>
<div class="relative flex items-center group">
<span class="absolute left-4 material-symbols-outlined text-on-surface-variant text-lg group-focus-within:text-secondary transition-colors" data-icon="shield_person">shield_person</span>
<input class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg py-4 pl-12 pr-4 text-sm text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-secondary transition-all neon-glow" id="user-id" placeholder="EXECUTIVE_ID_001" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.2em]" for="password">
                            Cryptographic Key
                        </label>
<a class="text-[10px] font-bold text-secondary-dim uppercase tracking-wider hover:text-secondary transition-colors" href="#">Emergency Reset</a>
</div>
<div class="relative flex items-center group">
<span class="absolute left-4 material-symbols-outlined text-on-surface-variant text-lg group-focus-within:text-secondary transition-colors" data-icon="key">key</span>
<input class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg py-4 pl-12 pr-4 text-sm text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-secondary transition-all neon-glow" id="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Submit Action -->
<div class="pt-2">
<button class="w-full bg-gradient-to-r from-primary to-primary-dim hover:from-primary-fixed-dim hover:to-primary py-4 rounded-lg flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-lg shadow-primary/10 group" type="submit">
<span class="text-on-primary-fixed text-sm font-bold tracking-tight">AUTHORIZE ACCESS</span>
<span class="material-symbols-outlined text-on-primary-fixed text-lg group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Footer / Metadata -->
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-6">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></div>
<span class="text-[10px] text-on-surface-variant font-medium tracking-wider">SECURE LINK ESTABLISHED</span>
</div>
<div class="w-[1px] h-3 bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="text-[10px] text-on-surface-variant font-medium tracking-wider uppercase">Node: DX-92</span>
</div>
</div>
<p class="text-[10px] text-on-surface-variant/40 text-center leading-relaxed max-w-[280px]">
                Unauthorized access to this terminal is strictly prohibited under Digital Protocol 42-B. All session data is being monitored.
            </p>
</div>
</main>
<!-- Decorative Corner Accents -->
<div class="fixed top-8 left-8 w-12 h-12 border-t-2 border-l-2 border-primary/20 pointer-events-none"></div>
<div class="fixed bottom-8 right-8 w-12 h-12 border-b-2 border-r-2 border-secondary/20 pointer-events-none"></div>
<script src="./login-gate.js"></script>
