      class SectionErrorBoundary extends React.Component {
        constructor(props) {
          super(props);
          this.state = { hasError: false };
        }
        static getDerivedStateFromError() {
          return { hasError: true };
        }
        render() {
          if (this.state.hasError) {

      function toFlag(country) {
        const map = {
          "united states": "US",
          usa: "US",
          us: "US",
          spain: "ES",
          espana: "ES",
          es: "ES",
          mexico: "MX",
          mx: "MX",
          argentina: "AR",
          ar: "AR",
          colombia: "CO",
          co: "CO",
          chile: "CL",
          cl: "CL",
          uk: "GB",
          gb: "GB",
          france: "FR",
          fr: "FR",
          germany: "DE",
          de: "DE",
          italy: "IT",
          it: "IT",
          brazil: "BR",
          br: "BR",
          canada: "CA",
          ca: "CA"
        };
        const raw = String(country || "").toLowerCase().trim();
        const code = map[raw] || raw.toUpperCase();
        if (code.length !== 2) return "🌍";
        return String.fromCodePoint(...[...code].map((c) => 127397 + c.charCodeAt()));
      }

      function sourceOf(lead) {
        if (lead.mgo_directo || lead.mgo_en_canal) return "mgo";
        const s = String(lead.utm_source || "direct").toLowerCase();
        if (s.includes("insta")) return "instagram";
        if (s.includes("tiktok")) return "tiktok";
        if (s.includes("twitter") || s === "x") return "x";
        if (s.includes("reddit")) return "reddit";
        if (s.includes("mgo")) return "mgo";
        return s || "direct";
      }

      function formatSince(dateLike) {
        const t = new Date(dateLike || Date.now()).getTime();
        if (Number.isNaN(t)) return "-";
        const sec = Math.floor((Date.now() - t) / 1000);
        if (sec < 60) return sec + "s active";
        const min = Math.floor(sec / 60);
        if (min < 60) return min + "m active";
        const h = Math.floor(min / 60);
        if (h < 24) return h + "h " + (min % 60) + "m active";
        return Math.floor(h / 24) + "d active";
      }

      function fmtDate(v) {
        if (!v) return "-";
        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return "-";
        return d.toLocaleString("es-ES");
      }

      function inferFlow(lead) {
        if (String(lead.active_flow || "") === "6") return "6";
        if (lead.of_activo) return "4";
        if (lead.mgo_directo) return "1";
        if (lead.mgo_en_canal && !lead.mgo_directo) return "2";
        if (lead.telegram_activo && !lead.mgo_directo && !lead.mgo_en_canal && !lead.of_activo) return "3";
        const updated = new Date(lead.updated_at || lead.created_at || Date.now()).getTime();
        const days = (Date.now() - updated) / (1000 * 60 * 60 * 24);
        if (!lead.winback_sent && (lead.mgo_directo || lead.mgo_en_canal) && days > 14) return "5";
        return "3";
      }

      function flowRows(leads) {
        const now = Date.now();
        const f = {
          "1": leads.filter((l) => !!l.mgo_directo),
          "2": leads.filter((l) => !!l.mgo_en_canal && !l.mgo_directo),
          "3": leads.filter((l) => !!l.telegram_activo && !l.mgo_directo && !l.mgo_en_canal && !l.of_activo),
          "4": leads.filter((l) => !!l.of_activo),
          "5": leads.filter((l) => !l.winback_sent && (l.mgo_directo || l.mgo_en_canal) && (now - new Date(l.updated_at || l.created_at || now).getTime()) > 14 * 24 * 3600 * 1000),
          "6": leads.filter((l) => String(l.active_flow || "") === "6")
        };

        return Object.keys(f).map((id) => {
          const rows = f[id];
          const avgMs = rows.length
            ? rows.reduce((acc, l) => acc + Math.max(0, new Date(l.updated_at || Date.now()).getTime() - new Date(l.created_at || Date.now()).getTime()), 0) / rows.length
            : 0;
          const latest = rows.length
            ? Math.max(...rows.map((l) => new Date(l.updated_at || l.created_at || Date.now()).getTime()))
            : 0;
          const stale = rows.length > 0 && Date.now() - latest > 24 * 3600 * 1000;
          return {
            id,
            name: FLOW_NAMES[id],
            total: rows.length,
            avg: rows.length ? Math.round(avgMs / (1000 * 60)) + " min" : "-",
            health: rows.length === 0 || stale ? "WARNING" : "OPERATIONAL"
          };
        });
      }

      function downloadCsv(filename, rows) {
        if (!rows.length) return;
        const keys = Object.keys(rows[0]);
        const csv = [keys.join(",")]
          .concat(rows.map((r) => keys.map((k) => JSON.stringify(r[k] ?? "")).join(",")))
          .join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      }

      function StackedSourceChart({ leads }) {
        const ref = useRef(null);
        const instance = useRef(null);

        useEffect(() => {
          if (!ref.current || !window.Chart) return;
          const sources = ["instagram", "tiktok", "x", "reddit", "mgo", "direct"];
          const tg = sources.map((s) => leads.filter((l) => sourceOf(l) === s && l.telegram_activo).length);
          const of = sources.map((s) => leads.filter((l) => sourceOf(l) === s && l.of_activo).length);

          if (instance.current) instance.current.destroy();
          instance.current = new window.Chart(ref.current, {
            type: "bar",
            data: {
              labels: ["INSTA", "TIKTOK", "X", "REDDIT", "MGO", "DIRECT"],
              datasets: [
                { label: "Telegram", data: tg, backgroundColor: "#00e3fd" },
                { label: "OnlyFans", data: of, backgroundColor: "#b6a0ff" }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { labels: { color: "#f8f5fd" } } },
              scales: {
                x: { stacked: true, ticks: { color: "#acaab1" }, grid: { color: "#2c2b33" } },
                y: { stacked: true, ticks: { color: "#acaab1" }, grid: { color: "#2c2b33" } }
              }
            }
          });
          return () => instance.current && instance.current.destroy();
        }, [leads]);

        return <canvas ref={ref}></canvas>;
      }

      function DailyChart({ leads, events, range }) {
        const ref = useRef(null);
        const instance = useRef(null);

        useEffect(() => {
          if (!ref.current || !window.Chart) return;
          const days = [];
          for (let i = range - 1; i >= 0; i -= 1) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const key = d.toISOString().slice(0, 10);
            days.push({ key, label: key.slice(5), newUsers: 0, tg: 0, of: 0 });
          }
          const map = Object.fromEntries(days.map((d) => [d.key, d]));

          leads.forEach((l) => {
            const k = String(l.created_at || "").slice(0, 10);
            if (!map[k]) return;
            map[k].newUsers += 1;
            if (l.telegram_activo) map[k].tg += 1;
          });
          events.forEach((e) => {
            if (String(e.boton_clickado || "").toLowerCase() !== "onlyfans") return;
            const k = String(e.created_at || "").slice(0, 10);
            if (map[k]) map[k].of += 1;
          });

          const rows = days.map((d) => map[d.key]);

          if (instance.current) instance.current.destroy();
          instance.current = new window.Chart(ref.current, {
            type: "bar",
            data: {
              labels: rows.map((r) => r.label),
              datasets: [
                { label: "Nuevos", data: rows.map((r) => r.newUsers), backgroundColor: "#b6a0ff" },
                { label: "Telegram", data: rows.map((r) => r.tg), backgroundColor: "#00e3fd" },
                { label: "OnlyFans", data: rows.map((r) => r.of), backgroundColor: "#ff6c95" }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { labels: { color: "#f8f5fd" } } },
              scales: {
                x: { ticks: { color: "#acaab1" }, grid: { color: "#2c2b33" } },
                y: { ticks: { color: "#acaab1" }, grid: { color: "#2c2b33" } }
              }
            }
          });
          return () => instance.current && instance.current.destroy();
        }, [leads, events, range]);

        return <canvas ref={ref}></canvas>;
      }

      function WorldMap({ topCountries }) {
        const points = {
          US: [38, -97], ES: [40, -4], MX: [23, -102], AR: [-34, -64], CO: [4, -74], CL: [-30, -71],
          GB: [54, -2], FR: [46, 2], DE: [51, 10], IT: [42, 12], BR: [-14, -51], CA: [56, -106]
        };

        function project(lat, lon) {
          const x = ((lon + 180) / 360) * 640;
          const y = ((90 - lat) / 180) * 300;
          return [x, y];
        }

        return (
          <div className="rounded-xl border border-white/10 bg-card p-4">
            <svg viewBox="0 0 640 300" className="h-44 w-full rounded bg-surface">
              <rect x="0" y="0" width="640" height="300" fill="#131318" />
              {topCountries.map((c, idx) => {
                const code = String(c.code || "").toUpperCase();
                const p = points[code] || null;
                if (!p) return null;
                const [x, y] = project(p[0], p[1]);
                return <circle key={code + idx} cx={x} cy={y} r={5} fill="#00e3fd" opacity="0.9" />;
              })}
            </svg>
            <div className="mt-3 space-y-2 text-xs text-muted">
              {topCountries.slice(0, 5).map((c) => (
                <div key={c.code} className="flex items-center justify-between">
                  <span>{toFlag(c.country)} {c.country}</span>
                  <span className="font-bold text-white">{c.perc}%</span>
                </div>
              ))}
            </div>
          </div>
        );
      }

      function Login({ onAuth }) {
        const [password, setPassword] = useState("");
        const [error, setError] = useState("");

        const submit = (e) => {
          e.preventDefault();
          if (String(password).trim() !== String(ADMIN_PASSWORD).trim()) {
            setError("Contrasena invalida");
            return;
          }
          sessionStorage.setItem(SESSION_KEY, "1");
          onAuth(true);
        };

        return (
          <div className="min-h-screen bg-background flex items-center justify-center p-6">
            <main className="w-full max-w-md rounded-2xl border border-white/10 bg-card p-8 shadow-2xl">
              <h1 className="text-2xl font-black tracking-tight">Panel Admin</h1>
              <p className="mt-1 text-xs uppercase tracking-widest text-muted">Acceso seguro</p>
              <form className="mt-8 space-y-4" onSubmit={submit}>
                <div>
                  <label className="mb-2 block text-[11px] font-bold uppercase tracking-widest text-muted">Contrasena</label>
                  <input
                    type="password"
                    className="w-full rounded-lg border border-white/20 bg-surface px-4 py-3 text-sm"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    placeholder="******"
                  />
                </div>
                {error ? <p className="text-xs text-red-300">{error}</p> : null}
                <button className="w-full rounded-lg bg-gradient-to-r from-primary to-secondary px-4 py-3 text-sm font-black text-black">
                  Entrar
                </button>
              </form>
            </main>
          </div>
        );
      }

      function App() {
        const [authed, setAuthed] = useState(sessionStorage.getItem(SESSION_KEY) === "1");
        const [active, setActive] = useState("dashboard");
        const [leads, setLeads] = useState([]);
        const [events, setEvents] = useState([]);
        const [messages, setMessages] = useState([]);
        const [selectedLeadId, setSelectedLeadId] = useState(null);
        const [loading, setLoading] = useState(true);
        const [actionLoading, setActionLoading] = useState({});
        const [feedback, setFeedback] = useState("");
        const [search, setSearch] = useState("");
        const [filtersOpen, setFiltersOpen] = useState(false);
        const [range, setRange] = useState(30);
        const [filters, setFilters] = useState({ utm: "all", country: "all", cupid: "all" });
        const [botInput, setBotInput] = useState("");
        const [changeFlow, setChangeFlow] = useState("3");

        const selectedLead = useMemo(() => leads.find((l) => l.visitor_id === selectedLeadId) || null, [leads, selectedLeadId]);

        const loadLeads = useCallback(async () => {
          const { data, error } = await client.from("leads").select("*").order("updated_at", { ascending: false }).limit(5000);
          if (!error) setLeads(data || []);
        }, []);

        const loadEvents = useCallback(async () => {
          const { data, error } = await client.from("eventos").select("*").order("created_at", { ascending: false }).limit(5000);
          if (!error) setEvents(data || []);
        }, []);

        const loadMessages = useCallback(async (visitorId) => {
          if (!visitorId) return;
          const { data, error } = await client.from("mensajes").select("*").eq("visitor_id", visitorId).order("created_at", { ascending: true }).limit(1000);
          if (!error) setMessages(data || []);
        }, []);

        const reloadAll = useCallback(async () => {
          setLoading(true);
          await Promise.all([loadLeads(), loadEvents()]);
          setLoading(false);
        }, [loadLeads, loadEvents]);

        useEffect(() => {
          if (!authed) return;
          reloadAll();
        }, [authed, reloadAll]);

        useEffect(() => {
          if (selectedLeadId) loadMessages(selectedLeadId);
        }, [selectedLeadId, loadMessages]);

        useEffect(() => {
          if (!authed) return;
          const ch = client
            .channel("admin-live")
            .on("postgres_changes", { event: "*", schema: "public", table: "leads" }, () => loadLeads())
            .on("postgres_changes", { event: "*", schema: "public", table: "eventos" }, () => loadEvents())
            .on("postgres_changes", { event: "*", schema: "public", table: "mensajes" }, () => selectedLeadId && loadMessages(selectedLeadId))
            .subscribe();

          const timer = setInterval(() => {
            loadLeads();
            loadEvents();
            if (selectedLeadId) loadMessages(selectedLeadId);
          }, 30000);

          return () => {
            client.removeChannel(ch);
            clearInterval(timer);
          };
        }, [authed, loadLeads, loadEvents, loadMessages, selectedLeadId]);

        const metrics = useMemo(() => {
          return {
            total: leads.length,
            telegram: leads.filter((l) => l.telegram_activo).length,
            of: leads.filter((l) => l.of_activo).length,
            cupid: leads.filter((l) => l.cupidbot_activo).length
          };
        }, [leads]);

        const funnels = useMemo(() => flowRows(leads), [leads]);

        const topCountries = useMemo(() => {
          const m = new Map();
          leads.forEach((l) => {
            const c = String(l.pais || "").trim();
            if (!c) return;
            m.set(c, (m.get(c) || 0) + 1);
          });
          const total = Math.max(1, leads.length);
          return Array.from(m.entries())
            .map(([country, count]) => ({ country, code: country.slice(0, 2).toUpperCase(), count, perc: ((count / total) * 100).toFixed(1) }))
            .sort((a, b) => b.count - a.count)
            .slice(0, 10);
        }, [leads]);

        const statsBySource = useMemo(() => {
          const m = new Map();
          leads.forEach((l) => {
            const s = sourceOf(l);
            const row = m.get(s) || { source: s, total: 0, tg: 0, of: 0, convMs: 0, convCount: 0 };
            row.total += 1;
            if (l.telegram_activo) row.tg += 1;
            if (l.of_activo) {
              row.of += 1;
              row.convMs += Math.max(0, new Date(l.updated_at || Date.now()) - new Date(l.created_at || Date.now()));
              row.convCount += 1;
            }
            m.set(s, row);
          });
          return Array.from(m.values()).map((r) => ({
            ...r,
            tgPct: r.total ? ((r.tg / r.total) * 100).toFixed(1) : "0.0",
            ofPct: r.total ? ((r.of / r.total) * 100).toFixed(1) : "0.0",
            avgDays: r.convCount ? (r.convMs / r.convCount / (1000 * 60 * 60 * 24)).toFixed(1) : "-"
          }));
        }, [leads]);

        const filteredLeads = useMemo(() => {
          return leads.filter((l) => {
            const src = sourceOf(l);
            const flow = inferFlow(l);
            const q = search.toLowerCase().trim();
            const byQ = !q || String(l.visitor_id || "").toLowerCase().includes(q) || String(l.ciudad || "").toLowerCase().includes(q) || flow.includes(q);
            const byUtm = filters.utm === "all" || src === filters.utm;
            const byCountry = filters.country === "all" || String(l.pais || "").toLowerCase() === filters.country;
            const byCupid = filters.cupid === "all" || (filters.cupid === "on" ? !!l.cupidbot_activo : !l.cupidbot_activo);
            return byQ && byUtm && byCountry && byCupid;
          });
        }, [leads, search, filters]);

        const leadsByFlow = useMemo(() => {
          const g = { "1": [], "2": [], "3": [], "4": [], "5": [], "6": [] };
          filteredLeads.forEach((l) => {
            g[inferFlow(l)].push(l);
          });
          return g;
        }, [filteredLeads]);

        const conflicts = useMemo(() => leads.filter((l) => String(l.active_flow || "") === "6"), [leads]);

        const resolvedHistory = useMemo(() => {
          return events
            .filter((e) => String(e.boton_clickado || "").toLowerCase().includes("resolve") || String(e.boton_clickado || "").toLowerCase().includes("resuelto"))
            .slice(0, 50);
        }, [events]);

        const countriesFilter = useMemo(() => Array.from(new Set(leads.map((l) => String(l.pais || "").toLowerCase()).filter(Boolean))).sort(), [leads]);

        const runAction = useCallback(async (key, fn, okMessage) => {
          setActionLoading((s) => ({ ...s, [key]: true }));
          setFeedback("");
          try {
            await fn();
            if (okMessage) setFeedback(okMessage);
            await reloadAll();
            if (selectedLeadId) await loadMessages(selectedLeadId);
          } catch (e) {
            setFeedback("Error: " + (e?.message || "accion fallida"));
          } finally {
            setActionLoading((s) => ({ ...s, [key]: false }));
          }
        }, [reloadAll, selectedLeadId, loadMessages]);

        const exportLeadsCsv = () => downloadCsv("reporte_leads.csv", leads);

        if (!authed) return <Login onAuth={setAuthed} />;

        const navItems = [
          { id: "dashboard", label: "Dashboard", icon: "dashboard" },
          { id: "users", label: "Users", icon: "group" },
          { id: "stats", label: "Statistics", icon: "leaderboard" },
          { id: "alerts", label: "Alerts", icon: "notifications_active" },
          { id: "profile", label: "User Profile", icon: "person" }
        ];

        return (
          <div className="min-h-screen bg-background text-white">
            <aside className="fixed left-0 top-0 z-50 flex h-screen w-64 flex-col bg-[#131318] py-6">

                          <table className="w-full text-left text-xs">
                            <thead className="text-muted">
                              <tr><th className="py-2">Source</th><th>Total</th><th>% TG</th><th>% OF</th><th>Avg dias</th></tr>
                            </thead>
                            <tbody>
                              {statsBySource.map((r) => (
                                <tr key={r.source} className="border-t border-white/10"><td className="py-2 font-bold uppercase">{r.source}</td><td>{r.total}</td><td>{r.tgPct}%</td><td>{r.ofPct}%</td><td>{r.avgDays}</td></tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                      <WorldMap topCountries={topCountries} />
                    </div>
                  </div>
                </SectionErrorBoundary>
              )}

              {active === "alerts" && (
                <SectionErrorBoundary>
                  <div className="space-y-6">
                    <div>
                      <h2 className="text-2xl font-black">System Alerts</h2>
                      <p className="text-sm text-muted">Conflictos activos y resoluciones</p>
                    </div>

                    <div className="rounded-xl border border-white/10 bg-card">
                      <div className="border-b border-white/10 px-6 py-4"><h3 className="text-sm font-black uppercase text-tertiary">ACTIVE CONFLICTS ({conflicts.length})</h3></div>
                      <div className="divide-y divide-white/5">
                        {conflicts.length === 0 ? <p className="p-4 text-xs text-muted">No hay conflictos activos</p> : null}
                        {conflicts.map((l) => (
                          <div key={l.id || l.visitor_id} className="flex flex-wrap items-center justify-between gap-3 p-4 text-sm">
                            <div>
                              <div className="mb-1 inline-block rounded bg-tertiary/20 px-2 py-0.5 text-[10px] font-black text-tertiary">CRITICAL</div>
                              <p className="font-bold">{l.visitor_id}</p>
                              <p className="text-xs text-muted">{formatSince(l.updated_at)} · Multiple variables active simultaneously - manual intervention required</p>
                            </div>
                            <div className="flex gap-2">
                              <button className="rounded border border-yellow-400/40 bg-yellow-500/10 px-3 py-2 text-xs text-yellow-200" onClick={() => runAction("take-" + l.visitor_id, async () => {
                                const flow = l.telegram_activo ? "3" : l.mgo_directo ? "1" : "2";
                                const { error } = await client.from("leads").update({ active_flow: flow }).eq("visitor_id", l.visitor_id);
                                if (error) throw error;
                                setSelectedLeadId(l.visitor_id);
                                setActive("profile");
                              }, "Take control aplicado")}>Take Control</button>
                              <button className="rounded border border-green-400/40 bg-green-500/10 px-3 py-2 text-xs text-green-200" onClick={() => runAction("resolve-" + l.visitor_id, async () => {
                                const { error } = await client.from("leads").update({ active_flow: null, cupidbot_activo: false }).eq("visitor_id", l.visitor_id);
                                if (error) throw error;
                              }, "Conflict resolved")}>Resolve</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="rounded-xl border border-white/10 bg-card">
                      <div className="border-b border-white/10 px-6 py-4"><h3 className="text-sm font-black uppercase">RESOLVED HISTORY</h3></div>
                      <div className="divide-y divide-white/5">
                        {resolvedHistory.length === 0 ? <p className="p-4 text-xs text-muted">Sin historial de resolucion</p> : null}
                        {resolvedHistory.map((e) => (
                          <div key={e.id} className="p-4 text-sm">
                            <p className="font-bold">{e.visitor_id || e.request_id || "-"}</p>
                            <p className="text-xs text-muted">{String(e.boton_clickado || "resuelto")}</p>
                            <p className="text-[11px] text-muted">{fmtDate(e.created_at)}</p>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </SectionErrorBoundary>
              )}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
